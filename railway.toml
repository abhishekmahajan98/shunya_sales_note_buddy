[build]
builder = "NIXPACKS"
# This tells Railway to ignore the root and look in /backend for requirements.txt
root = "backend"

[deploy]
# Note: Since 'root' is set to 'backend', the path is relative to /backend
# If your code is in /backend/app/main.py, the command should be:
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthCheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"

[deploy.env]
PYTHONPATH = "."