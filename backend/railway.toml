[build]
builder = "nixpacks"
# Option A: If you just want to install requirements (Nixpacks usually does this anyway)
# buildCommand = "pip install -r requirements.txt"
# Option B: Leave it empty if you don't have a specific build step
buildCommand = "echo 'Build phase complete'"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthCheckPath = "/health"
healthCheckTimeout = 30
restartPolicyType = "on_failure"

[[services]]
name = "shunya-arcade-api"